---
# Connection settings for Cisco NX-OS switches
ansible_connection: ansible.netcommon.network_cli
ansible_network_os: cisco.nxos.nxos
ansible_become: false

# Set these per-environment or encrypt with Ansible Vault:
# ansible_user: admin
# ansible_password: !vault |
#   $ANSIBLE_VAULT;1.2;AES256
#   ...

# --- Upgrade Variables ---
# Target NX-OS version and image filename.
# Update these values for each upgrade campaign.
target_nxos_version: "10.3(2)"
target_nxos_image: "nxos64-cs.10.3.2.F.bin"
target_image_md5: "REPLACE_WITH_MD5_FROM_CISCO_DOWNLOADS"

# SCP server hosting the NX-OS image.
# Encrypt scp_password with Ansible Vault.
scp_server: "192.168.1.100"
scp_user: "scpuser"
scp_password: "REPLACE_WITH_SCP_PASSWORD"
scp_file_path: "/"

# The following variables have sensible defaults in the nxos_upgrade role
# (roles/nxos_upgrade/defaults/main.yml). Override them here if needed:
#   copy_vrf: "management"
#   scp_file_path: "/"
#   delete_old_image: false
#   nxos_issu: "no"
#   slack_channel: ""

# --- Slack Notifications ---
# Incoming webhook URL for upgrade notifications.
# Create one at: https://api.slack.com/messaging/webhooks
# Encrypt with Ansible Vault for production use.
slack_webhook_url: "REPLACE_WITH_SLACK_WEBHOOK_URL"

# Slack channel override (optional). Leave empty to use the webhook default.
# slack_channel: "#network-upgrades"
