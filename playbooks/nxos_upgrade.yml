---
# Playbook: Cisco NX-OS Software Upgrade
#
# Upgrades NX-OS software on Cisco Nexus switches with full
# pre-check validation, image transfer, installation, and
# post-upgrade verification.
#
# Usage:
#   ansible-playbook playbooks/nxos_upgrade.yml
#   ansible-playbook playbooks/nxos_upgrade.yml --limit nxos_switch1
#   ansible-playbook playbooks/nxos_upgrade.yml --check   # dry-run
#   ansible-playbook playbooks/nxos_upgrade.yml -e "delete_old_image=true"
#
# Required variables (set in group_vars/nxos.yml):
#   - target_nxos_version   : Target NX-OS version string (e.g. "10.3(2)")
#   - target_nxos_image     : Image filename (e.g. "nxos64-cs.10.3.2.F.bin")
#   - target_image_md5      : MD5 checksum of the target image
#   - scp_server            : SCP server IP/hostname holding the image
#   - scp_user              : SCP username
#   - scp_password          : SCP password (use Ansible Vault)
#   - scp_file_path         : Path to image on SCP server (default: "/")
#   - copy_vrf              : VRF for SCP transfer (default: "management")

- name: Cisco NX-OS Software Upgrade
  hosts: nxos
  gather_facts: false
  vars:
    copy_vrf: management
    scp_file_path: "/"
    delete_old_image: false

  tasks:
    # ------------------------------------------------------------------
    # PRE-CHECKS
    # ------------------------------------------------------------------
    - name: "PRE-CHECK | Gather NX-OS facts"
      cisco.nxos.nxos_facts:
        gather_subset:
          - min
      register: nxos_facts

    - name: "PRE-CHECK | Display current NX-OS version"
      ansible.builtin.debug:
        msg: "Current version: {{ nxos_facts.ansible_facts.ansible_net_version }}"

    - name: "PRE-CHECK | Skip if already running target version"
      ansible.builtin.meta: end_host
      when: nxos_facts.ansible_facts.ansible_net_version == target_nxos_version

    - name: "PRE-CHECK | Verify bootflash free space"
      cisco.nxos.nxos_command:
        commands:
          - command: "dir bootflash: | json-pretty"
      register: bootflash_dir

    - name: "PRE-CHECK | Display bootflash usage"
      ansible.builtin.debug:
        msg: "{{ bootflash_dir.stdout_lines[0] }}"

    - name: "PRE-CHECK | Check if target image already exists on bootflash"
      cisco.nxos.nxos_command:
        commands:
          - command: "dir bootflash:{{ target_nxos_image }}"
      register: image_check
      ignore_errors: true

    - name: "PRE-CHECK | Save running configuration"
      cisco.nxos.nxos_config:
        save_when: always

    - name: "PRE-CHECK | Backup running config to file"
      cisco.nxos.nxos_config:
        backup: true
        backup_options:
          filename: "{{ inventory_hostname }}_pre_upgrade_{{ ansible_date_time.date | default('backup') }}.cfg"
          dir_path: "{{ playbook_dir }}/../backups"

    # ------------------------------------------------------------------
    # IMAGE TRANSFER
    # ------------------------------------------------------------------
    - name: "TRANSFER | Copy NX-OS image to bootflash via SCP"
      cisco.nxos.nxos_command:
        commands:
          - command: >-
              copy scp://{{ scp_user }}:{{ scp_password }}@{{ scp_server }}{{ scp_file_path }}{{ target_nxos_image }}
              bootflash:{{ target_nxos_image }} vrf {{ copy_vrf }}
            prompt:
              - "continue connecting"
              - "Are you sure"
              - "Password"
            answer:
              - "yes"
              - "yes"
              - "{{ scp_password }}"
        wait_for: result[0] contains "Copy complete"
      vars:
        ansible_command_timeout: 3600
      when: image_check is failed

    # ------------------------------------------------------------------
    # IMAGE VERIFICATION
    # ------------------------------------------------------------------
    - name: "VERIFY | Check MD5 checksum of transferred image"
      cisco.nxos.nxos_command:
        commands:
          - command: "show file bootflash:{{ target_nxos_image }} md5sum"
      register: md5_result
      vars:
        ansible_command_timeout: 600

    - name: "VERIFY | Assert MD5 checksum matches"
      ansible.builtin.assert:
        that:
          - target_image_md5 in md5_result.stdout[0]
        fail_msg: >-
          MD5 mismatch! Expected {{ target_image_md5 }},
          got {{ md5_result.stdout[0] }}.
          Aborting upgrade.
        success_msg: "MD5 checksum verified successfully."

    # ------------------------------------------------------------------
    # INSTALL
    # ------------------------------------------------------------------
    - name: "INSTALL | Set boot variable to target image"
      cisco.nxos.nxos_install_os:
        system_image_file: "{{ target_nxos_image }}"
        issu: "{{ nxos_issu | default('no') }}"
      register: install_result
      vars:
        ansible_command_timeout: 2400

    # ------------------------------------------------------------------
    # RELOAD & WAIT
    # ------------------------------------------------------------------
    - name: "RELOAD | Wait for switch to come back online"
      ansible.builtin.wait_for_connection:
        delay: 300
        timeout: 1800
        sleep: 30

    # ------------------------------------------------------------------
    # POST-CHECKS
    # ------------------------------------------------------------------
    - name: "POST-CHECK | Gather NX-OS facts after upgrade"
      cisco.nxos.nxos_facts:
        gather_subset:
          - min
      register: post_facts

    - name: "POST-CHECK | Display new NX-OS version"
      ansible.builtin.debug:
        msg: "Upgraded version: {{ post_facts.ansible_facts.ansible_net_version }}"

    - name: "POST-CHECK | Assert upgrade was successful"
      ansible.builtin.assert:
        that:
          - post_facts.ansible_facts.ansible_net_version == target_nxos_version
        fail_msg: >-
          Upgrade verification FAILED.
          Expected {{ target_nxos_version }},
          running {{ post_facts.ansible_facts.ansible_net_version }}.
        success_msg: "Upgrade verified — running {{ target_nxos_version }}."

    - name: "POST-CHECK | Verify all line cards are online"
      cisco.nxos.nxos_command:
        commands:
          - command: "show module"
      register: module_status

    - name: "POST-CHECK | Display module status"
      ansible.builtin.debug:
        msg: "{{ module_status.stdout_lines[0] }}"

    - name: "POST-CHECK | Save running configuration"
      cisco.nxos.nxos_config:
        save_when: always

    # ------------------------------------------------------------------
    # CLEANUP (optional)
    # ------------------------------------------------------------------
    - name: "CLEANUP | Delete old NX-OS image from bootflash"
      cisco.nxos.nxos_command:
        commands:
          - command: "delete bootflash:{{ nxos_facts.ansible_facts.ansible_net_image }}"
            prompt:
              - "Do you want to delete"
            answer:
              - "y"
      when: delete_old_image | bool
