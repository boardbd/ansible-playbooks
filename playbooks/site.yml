---
# Master playbook — imports all role-based playbooks.
# Usage:
#   ansible-playbook playbooks/site.yml

- name: Apply common configuration to all nodes
  hosts: all
  become: true
  roles: []
    # - common

- name: Configure web servers
  hosts: webservers
  become: true
  roles: []
    # - webserver

- name: Configure database servers
  hosts: dbservers
  become: true
  roles: []
    # - database
